name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest --tb=short -q

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    # Informational only — mypy errors are tracked but do not block merges.
    # Remove continue-on-error once strict type coverage is achieved.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run mypy
        run: python -m mypy src/

  typecheck-strict:
    name: mypy --strict (hot files)
    runs-on: ubuntu-latest
    # §6.9 — BLOCKING: a strict-typing regression on a hot file fails CI.
    # NO continue-on-error here (contrast the informational `typecheck` job).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run mypy --strict on hot files
        run: >
          python -m mypy --strict
          src/kicad_mcp/tools/drc.py
          src/kicad_mcp/tools/board.py
          src/kicad_mcp_plugin/backends/plugin_direct.py

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install hatch
        run: pip install hatch
      - name: Build package
        run: hatch build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
