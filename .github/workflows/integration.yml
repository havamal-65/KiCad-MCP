name: Integration Tests

# Linux/xvfb integration tests against real KiCad pcbnew + bridge.
# Informational at launch — failing runs do not block merge (the job is
# kept off the branch-protection required-checks list, not via
# continue-on-error which would hide signal). Promote to required after
# >=5 consecutive green runs spanning >=1 calendar week.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration:
    name: pytest tests/integration
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: install-kicad
        run: |
          sudo add-apt-repository --yes ppa:kicad/kicad-9.0-releases
          sudo apt-get update
          sudo apt-get install --install-recommends -y kicad xvfb

      - name: install-bridge
        run: |
          pip install -e ".[dev]"
          kicad-mcp install-bridge --kicad-version 9.0

      - name: launch-pcbnew
        run: |
          cp tests/integration/fixtures/blank_board.kicad_pcb /tmp/test_board.kicad_pcb
          xvfb-run -a pcbnew /tmp/test_board.kicad_pcb > /tmp/pcbnew.stderr 2>&1 &
          echo $! > /tmp/pcbnew.pid

      - name: wait-for-bridge
        run: |
          for i in $(seq 1 60); do
            if python -c "import socket; s=socket.create_connection(('localhost', 9760), 2); s.close()" 2>/dev/null; then
              echo "::notice::bridge ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::bridge did not become ready within 60s"
          exit 1

      - name: diagnose-bridge-failure
        if: failure()
        run: |
          set +e
          echo "===== ps for pcbnew/xvfb ====="
          ps -ef | grep -E "pcbnew|xvfb" | grep -v grep || echo "  (no processes)"
          echo
          echo "===== /tmp/pcbnew.stderr (full) ====="
          cat /tmp/pcbnew.stderr 2>&1 || echo "  (file missing)"
          echo
          echo "===== ~/.local/share/kicad tree (depth 5) ====="
          find ~/.local/share/kicad -maxdepth 5 2>&1 || echo "  (dir missing)"
          echo
          echo "===== bridge install location contents ====="
          for d in ~/.local/share/kicad/9.0/scripting/plugins/kicad_mcp_bridge \
                   ~/.local/share/kicad/9.0/3rdparty/plugins/kicad_mcp_bridge \
                   ~/.local/share/kicad/9.0/plugins/kicad_mcp_bridge; do
            if [ -d "$d" ]; then
              echo "  --- $d ---"
              ls -la "$d"
            fi
          done
          echo
          echo "===== bridge_startup.log (search anywhere) ====="
          logs=$(find ~/.local/share/kicad -name bridge_startup.log 2>/dev/null)
          if [ -z "$logs" ]; then
            echo "  (log not found anywhere — bridge module never imported)"
          else
            for f in $logs; do
              echo "  --- $f ---"
              cat "$f"
            done
          fi
          echo
          echo "===== pcbnew.json ====="
          cat ~/.config/kicad/9.0/pcbnew.json 2>&1 || echo "  (pcbnew.json missing)"
          echo
          echo "===== kicad_common.json (may control plugin paths) ====="
          cat ~/.config/kicad/9.0/kicad_common.json 2>&1 || echo "  (kicad_common.json missing)"
          echo
          echo "===== /usr/share/kicad system plugin dirs ====="
          for d in /usr/share/kicad/scripting /usr/share/kicad/plugins /usr/share/kicad/3rdparty; do
            if [ -d "$d" ]; then
              echo "  --- $d ---"
              ls -la "$d" 2>&1 | head -20
            fi
          done
          echo
          echo "===== port 9760 listeners ====="
          ss -ltnp 2>&1 | grep 9760 || echo "  (nothing on port 9760)"
          echo
          echo "===== which kicad / pcbnew ====="
          which pcbnew kicad xvfb-run 2>&1

      - name: run-tests
        env:
          KICAD_INTEGRATION: "1"
        run: |
          python -m pytest tests/integration -m integration -v --tb=short

      - name: upload-logs-on-failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-failure-logs
          path: |
            /tmp/pcbnew.stderr
            /home/runner/.local/share/kicad/9.0/scripting/plugins/kicad_mcp_bridge/bridge_startup.log
            /home/runner/.local/share/kicad/9.0/3rdparty/plugins/kicad_mcp_bridge/bridge_startup.log
          if-no-files-found: warn
