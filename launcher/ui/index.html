<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KiCad-MCP Launcher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#42d17f; --amber:#f2b13c; --red:#f2647a; --blue:#5b9dff; --dim:#5f6b7c;
    --sans:system-ui,-apple-system,'Segoe UI',sans-serif;
    --mono:'JetBrains Mono',ui-monospace,'Consolas',monospace;
    --disp:'Space Grotesk',var(--sans);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#08090d;color:#e6e9ef;font-family:var(--sans)}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:#1c2230;border-radius:6px}
  ::-webkit-scrollbar-track{background:transparent}
  @keyframes lspin{to{transform:rotate(360deg)}}
  @keyframes lslide{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
  .feed>*{animation:lslide .28s ease}
  select.sel{appearance:none;-webkit-appearance:none}
  button{font-family:var(--sans)}
  .tool{white-space:nowrap;padding:7px 11px;border-radius:8px;border:1px solid rgba(255,255,255,.08);
    font:500 11.5px/1 var(--sans);background:#12172250;color:#9aa4b2;cursor:pointer;transition:all .15s}
  .tool:hover{background:#1c2230;color:#c8cfda}
  .toast{
    position:fixed;left:50%;bottom:16px;transform:translateX(-50%);
    background:#1c2230;border:1px solid rgba(255,255,255,.1);border-radius:9px;
    padding:9px 14px;font:500 12px/1.4 var(--mono);color:#c8cfda;max-width:88%;
    box-shadow:0 8px 24px rgba(0,0,0,.5);opacity:0;transition:opacity .25s;pointer-events:none;z-index:9;
    white-space:pre-wrap
  }
  .toast.show{opacity:1}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>

<script>
const GREEN='#42d17f', AMBER='#f2b13c', RED='#f2647a', BLUE='#5b9dff', DIM='#5f6b7c';
// Display labels (humanized) keyed by the true check name.
const CHECK_LABEL = {
  kicad_running:'KiCad running', bridge_reachable:'Bridge reachable',
  bridge_version_ok:'Bridge version OK', pcb_editor_open:'PCB editor open',
  kicad_cli_available:'kicad-cli available', project_loaded:'Project loaded'
};
const CHECK_ORDER = ['kicad_running','bridge_reachable','bridge_version_ok','pcb_editor_open','kicad_cli_available','project_loaded'];
const BACKENDS = [
  {key:'plugin', name:'plugin', desc:'live pcbnew edits · TCP :9760', cap:'bridge'},
  {key:'file', name:'file', desc:'direct .kicad_pcb / .kicad_sch parsing', cap:'4 caps'},
  {key:'cli', name:'cli', desc:'kicad-cli: DRC/ERC, gerber/BOM/pdf', cap:'8 caps'},
  {key:'subprocess', name:'subprocess', desc:'headless pcbnew — DSN fallback when bridge down', cap:''},
];

function colorFor(k){
  if(k==='up'||k==='running'||k==='ok'||k===true) return GREEN;
  if(k==='starting'||k==='restarting'||k==='partial') return AMBER;
  if(k==='down'||k==='unresponsive'||k==='err'||k==='error'||k==='stopped'||k===false) return RED;
  return DIM;
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmtUptime(sec){
  if(sec==null||sec<0) return '—';
  sec=Math.floor(sec); const d=Math.floor(sec/86400); sec-=d*86400;
  const h=Math.floor(sec/3600); sec-=h*3600; const m=Math.floor(sec/60);
  return `${d}d ${h}h ${m}m`;
}

function renderVals(st){
  const starting = st.phase==='starting' || st.phase==='restarting';
  const cl = st.checklist||{};
  const readyCount = CHECK_ORDER.filter(k=>cl[k]).length;
  const readyTotal = 6;
  const ready = readyCount===readyTotal;
  const readyColor = ready?GREEN:(starting?AMBER:RED);
  const readyText = ready?'READY':(starting?'STARTING…':'NOT READY');
  const readyBg = ready?'#42d17f14':(starting?'#f2b13c14':'#f2647a14');
  const readyPct = Math.round(readyCount/readyTotal*100);

  const checklist = CHECK_ORDER.map(k=>{
    const ok=!!cl[k];
    return {label:CHECK_LABEL[k], ok, color: ok?GREEN:(starting?AMBER:DIM),
      labelColor: ok?'#a9e9c6':(starting?'#f2d19a':'#9aa4b2'),
      chipBg: ok?'#42d17f10':(starting?'#f2b13c10':'#f2647a0d')};
  });

  const bMap={running:'RUNNING',starting:'CONNECTING',unresponsive:'UNRESPONSIVE'};
  const bridge=st.bridge||{};
  const bridgeColor=colorFor(bridge.status);
  const bridgeLabel=bMap[bridge.status]||String(bridge.status||'').toUpperCase();
  const bridgeDetail1=bridge.detail||'';
  const bridgeDetail2='board: '+(bridge.board||'none open');

  const server=st.server||{};
  const serverRunning=server.status==='running';
  const serverColor=colorFor(server.status);
  const serverLabel=serverRunning?'RUNNING':'STOPPED';
  const serverDetail1=serverRunning?('pid '+(server.pid==null?'—':server.pid)):'process not running';
  const serverDetail2=serverRunning?('uptime '+fmtUptime(server.uptimeSeconds)):'start to launch';

  const be=st.backends||{};
  const backends=BACKENDS.map(b=>{
    const s=be[b.key]||'idle'; const c=colorFor(s);
    return {name:b.name, desc:b.desc, cap:b.cap, color:c, nameColor: s==='up'?'#e6e9ef':c};
  });

  const activity=(st.activity||[]).map(a=>({time:a.time, tool:a.tool, status:a.status, color:colorFor(a.status)}));
  const activityRate=serverRunning?(ready?'live':'idle'):'offline';
  const logs=(st.logs||[]).map(l=>({time:l.time, level:l.level, msg:l.msg,
    levelColor: l.level==='WARNING'?AMBER:(l.level==='ERROR'||l.level==='CRITICAL'?RED:BLUE)}));

  let g=null;
  if(!starting){
    if(!serverRunning) g={accent:BLUE,title:'MCP server is stopped',body:'Nothing is listening. Start the launcher to bring the server, bridge and board online.',action:'Start everything',fn:'start'};
    else if(bridge.status!=='running') g={accent:AMBER,title:'pcbnew bridge is unreachable',body:'No live board path. Launch KiCad and open the PCB editor, or enable the IPC API server under Preferences → Plugins.',action:'Open PCB editor',fn:'openPcb'};
    else if(!ready) g={accent:AMBER,title:'Startup almost complete',body:'The bridge is up but the project has not finished loading. Give it a moment or reopen the board.',action:'Reload board',fn:'openPcb'};
  }

  const startLabel=starting?'Starting…':(ready?'Everything up':'Start everything');
  const startDisabled=starting||ready;
  const restartDisabled=starting||!serverRunning;
  const stopDisabled=starting||!serverRunning;

  return {starting, readyCount, readyTotal, ready, readyColor, readyText, readyBg, readyPct, checklist,
    bridgeColor, bridgeLabel, bridgeDetail1, bridgeDetail2,
    serverColor, serverLabel, serverDetail1, serverDetail2,
    backends, activity, activityRate, logs, g,
    startLabel, startDisabled, restartDisabled, stopDisabled,
    diags: st.diags||[], variant: st.variant||'console', trayAvailable: !!st.trayAvailable,
    projects: st.projects||[], projectIndex: st.projectIndex||0, projectPath: st.projectPath||''};
}

/* ---------- shared fragments ---------- */

function btnStyles(v){
  return {
    start: `display:inline-flex;align-items:center;justify-content:center;gap:8px;flex:1;padding:11px 14px;border-radius:10px;border:none;font:600 13px/1 var(--sans);cursor:${v.startDisabled?'default':'pointer'};background:${v.startDisabled?'#1c2230':GREEN};color:${v.startDisabled?DIM:'#0d1117'};opacity:${v.startDisabled&&!v.starting?'.75':'1'};transition:all .2s`,
    sec: `white-space:nowrap;padding:11px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.1);font:600 13px/1 var(--sans);background:#161b26;color:#c8cfda;cursor:pointer;transition:all .2s`,
    secDis: `white-space:nowrap;padding:11px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.1);font:600 13px/1 var(--sans);background:#161b26;color:#c8cfda;opacity:.5;cursor:default;transition:all .2s`,
    spin: v.starting?`width:12px;height:12px;border-radius:50%;border:2px solid #0d111740;border-top-color:#0d1117;animation:lspin .7s linear infinite;display:inline-block`:'display:none'
  };
}

function fragToolbar(v, pad){
  const tray = v.trayAvailable ? `<button class="tool" data-act="tray">Tray</button>` : '';
  const layout = v.variant==='bento'
    ? `<button class="tool" data-act="variantConsole">Narrow layout</button>`
    : `<button class="tool" data-act="variantBento">Wide layout</button>`;
  return `<div style="display:flex;flex-wrap:wrap;gap:7px;padding:${pad}">
    <button class="tool" data-act="stopAll">Stop everything</button>
    <button class="tool" data-act="browse">Add project…</button>
    <button class="tool" data-act="rescan">Rescan</button>
    <button class="tool" data-act="reveal">Reveal in Explorer</button>
    <button class="tool" data-act="copyCfg">Copy MCP config</button>
    <button class="tool" data-act="reinstallBridge">Reinstall bridge</button>
    <button class="tool" data-act="openSetup">Setup</button>
    ${layout}${tray}
  </div>`;
}

function fragDiags(v, margin){
  if(!v.diags.length) return '';
  return v.diags.map(d=>{
    const accent = d.blocking ? RED : AMBER;
    const owner = d.owner ? ` <span style="font:500 11px var(--mono);color:#9aa4b2">${esc(d.owner)}</span>` : '';
    const action = d.action ? `<button data-act="${esc(d.action)}" style="flex:none;background:${accent};color:#0d1117;border:none;border-radius:8px;padding:7px 12px;font:600 12px/1 var(--sans);cursor:pointer">Stop that process</button>` : '';
    return `<div style="margin:${margin};background:${accent}12;border:1px solid ${accent}38;border-radius:11px;padding:11px 14px;display:flex;align-items:center;gap:11px">
      <span style="width:14px;height:14px;border-radius:50%;background:${accent};display:flex;align-items:center;justify-content:center;font:700 10px var(--sans);color:#0d1117;flex:none">!</span>
      <span style="flex:1;min-width:0;font:400 12px/1.5 var(--sans);color:#c8cfda">${esc(d.message)}${owner}</span>
      ${action}
    </div>`;
  }).join('');
}

function fragGuidance(v, margin, horizontal){
  if(!v.g) return '';
  if(horizontal){
    return `<div style="grid-column:1 / -1;background:${v.g.accent}12;border:1px solid ${v.g.accent}38;border-radius:15px;padding:17px 20px;display:flex;align-items:center;gap:16px">
      <span style="width:22px;height:22px;border-radius:50%;background:${v.g.accent};display:flex;align-items:center;justify-content:center;font:700 13px var(--sans);color:#0d1117;flex:none">!</span>
      <div style="flex:1;min-width:0">
        <div style="font:600 13.5px/1 var(--disp);color:${v.g.accent};margin-bottom:5px">${esc(v.g.title)}</div>
        <div style="font:400 12.5px/1.5 var(--sans);color:#c8cfda">${esc(v.g.body)}</div>
      </div>
      <button data-act="${v.g.fn}" style="flex:none;background:${v.g.accent};color:#0d1117;border:none;border-radius:9px;padding:10px 16px;font:600 12.5px/1 var(--sans);cursor:pointer">${esc(v.g.action)} →</button>
    </div>`;
  }
  return `<div style="margin:${margin};background:${v.g.accent}12;border:1px solid ${v.g.accent}38;border-radius:13px;padding:15px 17px">
    <div style="display:flex;align-items:center;gap:9px;margin-bottom:7px">
      <span style="width:16px;height:16px;border-radius:50%;background:${v.g.accent};display:flex;align-items:center;justify-content:center;font:700 11px var(--sans);color:#0d1117">!</span>
      <span style="font:600 13.5px/1 var(--disp);color:${v.g.accent}">${esc(v.g.title)}</span>
    </div>
    <div style="font:400 12.5px/1.6 var(--sans);color:#c8cfda;margin-bottom:12px">${esc(v.g.body)}</div>
    <button data-act="${v.g.fn}" style="background:${v.g.accent};color:#0d1117;border:none;border-radius:8px;padding:8px 15px;font:600 12.5px/1 var(--sans);cursor:pointer">${esc(v.g.action)} →</button>
  </div>`;
}

function fragCard(label, color, big, d1, d2, radius){
  return `<div style="background:#161b26;border:1px solid rgba(255,255,255,.06);border-radius:${radius}px;padding:16px 18px">
    <div style="font:500 10.5px/1 var(--mono);letter-spacing:.09em;text-transform:uppercase;color:#5f6b7c">${label}</div>
    <div style="display:flex;align-items:center;gap:9px;margin:13px 0 11px">
      <span style="width:9px;height:9px;border-radius:50%;background:${color};box-shadow:0 0 10px ${color}"></span>
      <span style="font:600 21px/1 var(--disp);color:${color};letter-spacing:-.01em">${esc(big)}</span>
    </div>
    <div style="font:400 12px/1.55 var(--mono);color:#9aa4b2">${esc(d1)}</div>
    <div style="font:400 12px/1.55 var(--mono);color:#5f6b7c">${esc(d2)}</div>
  </div>`;
}

function fragBackendRows(v, hairline){
  return v.backends.map(b=>`<div style="display:flex;align-items:center;gap:11px;padding:6px 0;${hairline?'border-bottom:1px solid rgba(255,255,255,.04)':''}">
      <span style="width:8px;height:8px;border-radius:50%;background:${b.color};flex:none;box-shadow:0 0 8px ${b.color}"></span>
      <span style="font:600 12.5px/1 var(--mono);color:${b.nameColor};width:82px;flex:none">${esc(b.name)}</span>
      <span style="flex:1;min-width:0;font:400 12px/1.4 var(--sans);color:#9aa4b2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(b.desc)}</span>
      <span style="font:500 11px/1 var(--mono);color:#5f6b7c;flex:none">${esc(b.cap)}</span></div>`).join('');
}

function fragActivity(v){
  return v.activity.length ? v.activity.map(a=>`<div style="display:flex;align-items:center;gap:12px;font:400 12px/1.7 var(--mono)">
      <span style="color:#5f6b7c;flex:none">${esc(a.time)}</span>
      <span style="flex:1;min-width:0;color:#c8cfda;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(a.tool)}">${esc(a.tool)}</span>
      <span style="color:${a.color};flex:none">${esc(a.status)}</span></div>`).join('')
      : `<div style="font:400 12px/1.6 var(--mono);color:#5f6b7c">no recent tool calls</div>`;
}

function fragLogs(v){
  return v.logs.length ? v.logs.map(l=>`<div style="font:400 11.5px/1.55 var(--mono);color:#9aa4b2">
      <span style="color:#5f6b7c">${esc(l.time)}</span> <span style="color:${l.levelColor};font-weight:600">[${esc(l.level)}]</span> ${esc(l.msg)}</div>`).join('')
      : `<div style="font:400 11.5px/1.5 var(--mono);color:#5f6b7c">no recent warnings</div>`;
}

/* ---------- setup view (U3) ---------- */

let VIEW='dashboard';   // 'dashboard' | 'setup'
let SETUP=null;         // {items:[…], ok:bool} — fetched on demand, never on the poll

const FIX_LABEL={install_bridge:'Install / update bridge', register_claude:'Register with Claude Code', open_kicad_download:'Get KiCad'};
const SETUP_STATUS={pass:['OK',GREEN], fail:['NEEDS ATTENTION',RED], stale:['UPDATE AVAILABLE',AMBER], optional_missing:['NOT FOUND',DIM], unknown:['UNKNOWN',DIM]};

function setupBroken(items){ return items.filter(i=>i.required && (i.status==='fail'||i.status==='stale')); }

function fragSetupBanner(margin){
  if(!SETUP || SETUP.ok || VIEW==='setup') return '';
  const n = setupBroken(SETUP.items).length;
  return `<div style="margin:${margin};background:${RED}12;border:1px solid ${RED}38;border-radius:11px;padding:11px 14px;display:flex;align-items:center;gap:11px">
    <span style="width:14px;height:14px;border-radius:50%;background:${RED};display:flex;align-items:center;justify-content:center;font:700 10px var(--sans);color:#0d1117;flex:none">!</span>
    <span style="flex:1;min-width:0;font:400 12px/1.5 var(--sans);color:#c8cfda">Setup incomplete — ${n} item${n===1?'':'s'} need${n===1?'s':''} attention</span>
    <button data-act="openSetup" style="flex:none;background:${RED};color:#0d1117;border:none;border-radius:8px;padding:7px 12px;font:600 12px/1 var(--sans);cursor:pointer">Open setup</button>
  </div>`;
}

function tplSetup(){
  const items=(SETUP&&SETUP.items)||[];
  const ok=SETUP?SETUP.ok:true;
  const rows=items.length ? items.map(i=>{
    const [text,color]=SETUP_STATUS[i.status]||['?',DIM];
    const fixBtn=(i.fix && i.status!=='pass')
      ? `<button data-fix="${esc(i.fix)}" style="flex:none;background:${color===DIM?'#1c2230':color};color:${color===DIM?'#c8cfda':'#0d1117'};border:none;border-radius:8px;padding:8px 13px;font:600 12px/1 var(--sans);cursor:pointer">${esc(FIX_LABEL[i.fix]||i.fix)}</button>`
      : '';
    return `<div style="background:#161b26;border:1px solid rgba(255,255,255,.06);border-radius:13px;padding:14px 17px;display:flex;align-items:center;gap:13px">
      <span style="width:9px;height:9px;border-radius:50%;background:${color};box-shadow:0 0 9px ${color};flex:none"></span>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:baseline;gap:9px;flex-wrap:wrap">
          <span style="font:600 13.5px/1 var(--disp);color:#e6e9ef">${esc(i.label)}</span>
          <span style="font:500 10px/1 var(--mono);letter-spacing:.08em;text-transform:uppercase;color:#5f6b7c">${i.required?'required':'optional'}</span>
          <span style="font:600 10.5px/1 var(--mono);letter-spacing:.06em;color:${color}">${text}</span>
        </div>
        <div style="font:400 11.5px/1.5 var(--mono);color:#9aa4b2;margin-top:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(i.detail)}">${esc(i.detail)}</div>
      </div>
      ${fixBtn}
    </div>`;
  }).join('') : `<div style="font:400 12px/1.6 var(--mono);color:#5f6b7c;padding:6px 2px">checking…</div>`;
  const vColor = items.length ? (ok?GREEN:RED) : DIM;
  const vText = items.length ? (ok?'READY TO USE':'SETUP INCOMPLETE') : 'CHECKING…';
  return `
  <div id="root" style="width:100%;background:#0d1117;font-family:var(--sans);color:#e6e9ef">
    <div style="display:flex;align-items:center;gap:12px;padding:20px 22px 14px;border-bottom:1px solid rgba(255,255,255,.06)">
      <button class="tool" data-act="backDash">← Dashboard</button>
      <div style="font:600 15px/1 var(--disp);letter-spacing:-.01em">Setup</div>
      <div style="display:flex;align-items:center;gap:7px;padding:4px 10px;border-radius:20px;white-space:nowrap;background:${vColor}14;border:1px solid ${vColor}40">
        <span style="width:7px;height:7px;border-radius:50%;background:${vColor};box-shadow:0 0 8px ${vColor}"></span>
        <span style="font:600 11px/1 var(--mono);letter-spacing:.06em;color:${vColor}">${vText}</span>
      </div>
      <div style="flex:1"></div>
      <button class="tool" data-act="recheckSetup">Re-check</button>
    </div>
    <div style="padding:16px 22px 8px;display:flex;flex-direction:column;gap:10px">${rows}</div>
    <div style="padding:6px 24px 20px;font:400 11px/1.6 var(--mono);color:#5f6b7c">
      Fixes re-verify before reporting. Claude Code registration is added at user scope
      (available from any folder); this repo's own project-scope config always takes precedence here.
    </div>
  </div>`;
}

/* ---------- console (narrow) variant ---------- */

function tplConsole(v){
  const b = btnStyles(v);
  const options = v.projects.map(p=>`<option value="${esc(p.value)}" ${String(p.value)===String(v.projectIndex)?'selected':''}>${esc(p.label)}</option>`).join('');
  const checks = v.checklist.map(c=>`<div style="display:flex;align-items:center;gap:9px">
      <span style="width:7px;height:7px;border-radius:50%;background:${c.color};flex:none;box-shadow:0 0 7px ${c.color}"></span>
      <span style="font:500 12.5px/1.3 var(--mono);color:${c.labelColor}">${esc(c.label)}</span></div>`).join('');

  return `
  <div id="root" style="width:100%;background:#0d1117;font-family:var(--sans);color:#e6e9ef">
    <div style="padding:20px 22px 14px;border-bottom:1px solid rgba(255,255,255,.06)">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="width:26px;height:26px;border-radius:7px;background:#42d17f1a;border:1px solid #42d17f40;display:flex;align-items:center;justify-content:center;font:700 13px var(--disp);color:#42d17f">K</span>
        <div style="font:600 15px/1 var(--disp);letter-spacing:-.01em">KiCad · MCP Launcher</div>
        <div style="flex:1"></div>
        <div style="display:flex;align-items:center;gap:7px;padding:4px 10px;border-radius:20px;white-space:nowrap;background:${v.readyBg};border:1px solid ${v.readyColor}40">
          <span style="width:7px;height:7px;border-radius:50%;background:${v.readyColor};box-shadow:0 0 8px ${v.readyColor}"></span>
          <span style="font:600 11px/1 var(--mono);letter-spacing:.06em;color:${v.readyColor}">${esc(v.readyText)}</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-top:16px">
        <span style="font:500 11px/1 var(--mono);color:#5f6b7c;text-transform:uppercase;letter-spacing:.08em">Project</span>
        <select id="proj" class="sel" style="flex:1;min-width:0;background:#161b26;border:1px solid rgba(255,255,255,.09);border-radius:9px;padding:9px 12px;color:#e6e9ef;font:500 13px/1 var(--sans);cursor:pointer">${options}</select>
      </div>
      <div style="font:400 11px/1.4 var(--mono);color:#5f6b7c;margin-top:7px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(v.projectPath)}</div>
    </div>

    <div style="display:flex;gap:9px;padding:16px 22px 6px">

            <span style="font:600 12px/1 var(--mono);letter-spacing:.05em;color:${v.readyColor}">${esc(v.readyText)}</span>
          </div>
        </div>
        <div style="flex:1;min-width:0">
          <div style="font:600 12.5px/1 var(--disp);letter-spacing:.02em;color:#c8cfda;margin-bottom:10px">Ready for PCB</div>

/* ---------- glue ---------- */

let _toastTimer=null;
function toast(msg){
  if(!msg) return;
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>el.classList.remove('show'), 4200);
}

function fitWindow(){
  const a = (window.pywebview && window.pywebview.api) ? window.pywebview.api : null;
  if(!a || !a.fit_size) return;
  const root = document.getElementById('root');
  if(!root) return;
  // Width must never cause truncation: find the widest hidden overflow among
  // ellipsized elements (and the root itself) and ask for that much more.
  let overflow = Math.max(0, root.scrollWidth - root.clientWidth);
  root.querySelectorAll('[style*="ellipsis"]').forEach(el=>{
    overflow = Math.max(overflow, el.scrollWidth - el.clientWidth);
  });
  const contentW = overflow > 0 ? Math.ceil(window.innerWidth + overflow + 6) : 0;
  const p = a.fit_size(Math.ceil(root.getBoundingClientRect().height), window.innerHeight,
                       contentW, window.innerWidth);
  // After a width grow, re-measure once so height settles to the new layout
  // (terminates: the follow-up finds no overflow and requests no growth).
  if(contentW && p && p.then) p.then(()=>setTimeout(fitWindow, 90));
}

let LAST_ST={};
function render(st){
  if(st) LAST_ST=st;
  const app=document.getElementById('app');
  if(VIEW==='setup'){
    app.innerHTML = tplSetup();
    app.querySelectorAll('button[data-act]').forEach(b=>b.addEventListener('click', onAction));
    app.querySelectorAll('button[data-fix]').forEach(b=>b.addEventListener('click', onFix));
    requestAnimationFrame(fitWindow);
    return;
  }
  const sel=document.getElementById('proj');
  if(sel && document.activeElement===sel) return;   // don't clobber an open dropdown
  const v=renderVals(LAST_ST);
  app.innerHTML = v.variant==='bento' ? tplBento(v) : tplConsole(v);
  document.getElementById('proj').addEventListener('change', onProjectChange);
  app.querySelectorAll('button[data-act]').forEach(b=>b.addEventListener('click', onAction));
  requestAnimationFrame(fitWindow);
}

async function api(){ return (window.pywebview && window.pywebview.api) ? window.pywebview.api : null; }

async function refresh(){
  const a=await api(); if(!a) return;
  try{
    const st=await a.get_state();
    if(VIEW==='setup'){ LAST_ST=st; }   // setup state is NOT re-fetched on the poll
    else render(st);
  }catch(e){ /* transient */ }
}

async function onProjectChange(e){
  const a=await api(); if(!a) return;
  await a.select_project(e.target.value);
  refresh();
}

const ACTIONS = {
  start: a=>a.start_everything(),
  restart: a=>a.restart_mcp(),
  stop: a=>a.stop_mcp(),
  stopAll: a=>a.stop_everything(),
  openPcb: a=>a.open_pcb_editor(),
  browse: a=>a.browse_project(),
  rescan: a=>a.rescan_projects(),
  reveal: a=>a.reveal_project(),
  copyCfg: a=>a.copy_connect_info(),
  reinstallBridge: a=>a.reinstall_bridge(),
  stopForeign: a=>a.stop_foreign_server(),
  variantBento: a=>a.set_variant('bento'),
  variantConsole: a=>a.set_variant('console'),
  tray: a=>a.hide_to_tray(),
  openSetup: async a=>{ VIEW='setup'; render(); SETUP=await a.get_setup_state(true); render(); return null; },
  backDash: async a=>{ VIEW='dashboard'; render(); return null; },
  recheckSetup: async a=>{ SETUP=await a.get_setup_state(true); render(); return null; },
};

async function onFix(e){
  const btn=e.currentTarget, key=btn.getAttribute('data-fix');
  const a=await api(); if(!a) return;
  btn.disabled=true; btn.textContent='Working…';
  let res=null;
  try{ res=await a.run_fix(key); }
  catch(err){ toast('fix failed: '+err); }
  if(res){
    if(res.item && SETUP){
      SETUP.items=SETUP.items.map(i=>i.key===res.item.key?res.item:i);
      SETUP.ok=setupBroken(SETUP.items).length===0;
    }
    if(res.messages && res.messages.length) toast(res.messages.join('\n'));
  }
  render();
}

async function onAction(e){
  const act=e.currentTarget.getAttribute('data-act');
  const a=await api(); if(!a || !ACTIONS[act]) return;
  let res=null;
  try{ res=await ACTIONS[act](a); }
  catch(err){ toast('action failed: '+err); }
  if(res && res.messages && res.messages.length) toast(res.messages.join('\n'));
  refresh();
}

function boot(){
  refresh();
  setInterval(refresh, 1500);
  // One boot-time setup check — a broken install is never silent (REQ-WIZ-002).
  (async()=>{
    const a=await api(); if(!a || !a.get_setup_state) return;
    try{ SETUP=await a.get_setup_state(); if(!SETUP.ok) render(); }catch(e){}
  })();
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(()=>setTimeout(fitWindow, 30)); }
}
if(window.pywebview){ boot(); }
else { window.addEventListener('pywebviewready', boot); }
</script>
